<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Running audit… · Us</title>
  <link rel="icon" href="https://about-us.be/wp-content/smush-avif/2025/09/logo-us-32x32.png.avif" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #5c5c5c;
      --accent: #2d9d78;
      --accent-soft: #e8f5f0;
      --border: #e8e6e1;
      --error: #c62828;
      --error-soft: #ffebee;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Public Sans', system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      max-width: 480px;
      width: 100%;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .card::before {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--accent) 0%, #6bc9a8 45%, var(--accent) 100%);
    }
    .banner {
      width: 100%;
      aspect-ratio: 2 / 1;
      object-fit: cover;
      background: linear-gradient(145deg, var(--accent-soft) 0%, #f5f5f0 55%, var(--bg) 100%);
      display: block;
    }
    .content {
      padding: 28px 32px 36px;
    }
    .brand-line {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 0 0 12px;
    }
    .card h1 {
      font-family: 'Bricolage Grotesque', ui-serif, Georgia, serif;
      margin: 0 0 8px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .card .sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin: 0 0 28px;
    }
    .progress-wrap {
      text-align: left;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .progress-header .pct { color: var(--text); font-weight: 600; }
    .progress-header .remaining { color: var(--text-muted); }
    .progress-bar {
      height: 10px;
      background: var(--accent-soft);
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 5px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .error {
      margin-top: 20px;
      padding: 14px 16px;
      background: var(--error-soft);
      color: var(--error);
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: left;
    }
    .warning {
      margin-top: 12px;
      padding: 12px 14px;
      background: #fff8e1;
      color: #7a5a00;
      border: 1px solid #f0d98c;
      border-radius: 10px;
      font-size: 0.88rem;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="banner" id="banner" src="assets/loading-banner.png" alt="" />
    <div class="content">
      <p class="brand-line">Us · Co-creating digital impact</p>
      <h1 id="title">Running Accessibility tests...</h1>
      <p class="sub" id="msg">This may take a few minutes depending on the number of URL's</p>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-header">
          <span class="pct" id="pct-text">0% completed</span>
          <span class="remaining" id="remaining-text">—</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div id="warning" class="warning" style="display:none;"></div>
      <div id="error" class="error" style="display:none;"></div>
    </div>
  </div>

  <script>
    (function () {
      var meta = document.querySelector('meta[name="accessibility-app-base"]');
      window.ACCESSIBILITY_APP_BASE = (meta && meta.getAttribute('content')) ? (meta.getAttribute('content').replace(/\/$/, '')) : '';
    })();
    var APP_BASE = window.ACCESSIBILITY_APP_BASE || '';

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('title').textContent = 'Missing run ID';
      document.getElementById('msg').textContent = 'Go back and submit the form again.';
      document.getElementById('progress-wrap').style.display = 'none';
    } else {
      const AVG_SECONDS_PER_PAGE = 45;
      const startTime = Date.now();
      const fillEl = document.getElementById('progress-fill');
      const pctEl = document.getElementById('pct-text');
      const remainingEl = document.getElementById('remaining-text');
      const titleEl = document.getElementById('title');
      const msgEl = document.getElementById('msg');
      const warningEl = document.getElementById('warning');
      let urlCount = parseInt(params.get('urls'), 10) || 0;
      const initialTruncated = params.get('truncated') === '1';
      const initialRequested = parseInt(params.get('requested'), 10);
      const initialProcessed = parseInt(params.get('processed'), 10);
      const initialMaxUrls = parseInt(params.get('maxUrls'), 10);
      let fallbackRedirects = 0;
      let pollFailures = 0;
      let pollingStopped = false;

      document.getElementById('banner').onerror = function() {
        this.style.display = 'none';
      };

      const formatRemaining = (seconds) => {
        if (seconds <= 0) return 'Almost there…';
        if (seconds < 60) return `${seconds}s remaining`;
        const min = Math.ceil(seconds / 60);
        return `${min}min remaining`;
      };

      const updateProgress = (count) => {
        if (count != null) urlCount = count;
        const elapsed = (Date.now() - startTime) / 1000;
        const numPages = Math.max(1, urlCount);
        const estimatedTotal = numPages * AVG_SECONDS_PER_PAGE;
        const pct = Math.min(95, Math.round((elapsed / estimatedTotal) * 100));
        fillEl.style.width = pct + '%';
        pctEl.textContent = pct + '% completed';
        const remaining = Math.max(0, Math.ceil(estimatedTotal - elapsed));
        remainingEl.textContent = formatRemaining(remaining);
      };

      const showTruncatedWarning = (requested, processed, maxUrls) => {
        const req = Number.isFinite(requested) ? requested : null;
        const pro = Number.isFinite(processed) ? processed : null;
        const max = Number.isFinite(maxUrls) ? maxUrls : null;
        if (req != null && pro != null && req > pro) {
          warningEl.textContent = max != null
            ? `This run is testing ${pro} of ${req} submitted URL(s) because the server limit is set to ${max}.`
            : `This run is testing ${pro} of ${req} submitted URL(s) due to the current server URL limit.`;
          warningEl.style.display = 'block';
        }
      };

      if (initialTruncated) {
        showTruncatedWarning(initialRequested, initialProcessed, initialMaxUrls);
      }

      const tryReportFallback = () => {
        if (fallbackRedirects >= 3) return;
        fallbackRedirects += 1;
        window.location.replace(APP_BASE + '/report/' + id + '/');
      };

      const progressInterval = setInterval(updateProgress, 1000);

      const poll = async () => {
        if (pollingStopped) return;
        try {
          updateProgress();
          const res = await fetch(APP_BASE + '/api/status/' + id);
          const contentType = res.headers.get('content-type') || '';
          if (!contentType.includes('application/json')) {
            const text = await res.text();
            if (text.trim().startsWith('<')) {
              throw new Error('API not available: the server returned a page instead of JSON. Run the Node server (npm start) on the host that serves this app and ensure /api requests reach it (no static-only hosting).');
            }
            throw new Error(text || 'Invalid response');
          }
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || `Status request failed (${res.status})`);
          }
          if (!data.status) {
            throw new Error('Run status is unavailable. Please reopen the report link or start a new run.');
          }
          pollFailures = 0;
          titleEl.textContent = 'Running Accessibility tests...';
          msgEl.textContent = 'This may take a few minutes depending on the number of URL\'s';

          const count = data.processedUrls != null ? data.processedUrls : data.urls;
          if (count != null) updateProgress(count);
          if (data.truncated) {
            showTruncatedWarning(
              Number(data.requestedUrls),
              Number(data.processedUrls != null ? data.processedUrls : data.urls),
              Number(initialMaxUrls)
            );
          }

          if (data.status === 'done') {
            clearInterval(progressInterval);
            fillEl.style.width = '100%';
            pctEl.textContent = '100% completed';
            remainingEl.textContent = 'Done!';
            document.getElementById('msg').textContent = 'Loading report…';
            window.location.replace(APP_BASE + '/report/' + id + '/');
            return;
          }
          if (data.status === 'error') {
            titleEl.textContent = 'Still finalizing your report...';
            msgEl.textContent = 'Trying direct report access.';
            tryReportFallback();
            setTimeout(poll, 2000);
            return;
          }
        } catch (e) {
          pollFailures += 1;
          titleEl.textContent = 'Still running...';
          msgEl.textContent = 'Taking longer than usual. Reconnecting and checking your report.';
          if (pollFailures >= 2) {
            tryReportFallback();
          }
        }
        setTimeout(poll, 2000);
      };
      poll();
    }
  </script>
</body>
</html>
